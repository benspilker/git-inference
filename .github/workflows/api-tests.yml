name: API Tests

on:
  push:
    branches: [main]
    paths:
      - "git_inference_api/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    paths:
      - "git_inference_api/**"
      - ".github/workflows/api-tests.yml"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r git_inference_api/requirements.txt
      - name: Run unit tests
        run: |
          python -m unittest discover -s git_inference_api/tests -p "test_*.py" -v
