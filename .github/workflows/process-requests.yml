name: Process Inference Requests

on:
  push:
    branches: [main]
    paths:
      - "input/*.txt"
      - "requests/job_*.json"
  workflow_dispatch:
    inputs:
      prompt_text:
        description: "Prompt text to process immediately (optional)"
        required: false
        type: string
      simple_web_search_mode:
        description: "git-chatgpt web policy: default | time_sensitive_required | always_required"
        required: false
        default: "time_sensitive_required"
        type: choice
        options:
          - "default"
          - "time_sensitive_required"
          - "always_required"
      carry_previous_qa:
        description: "Carry previous Q/A into first post-/new prompt for git-chatgpt"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      upload_artifacts:
        description: "Upload diagnostics artifacts even on success"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: process-requests-main
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Process prompts (bash)
        env:
          PROMPT_TEXT_INPUT: ${{ github.event.inputs.prompt_text }}
          SIMPLE_WEB_SEARCH_MODE_INPUT: ${{ github.event.inputs.simple_web_search_mode }}
          SIMPLE_WEB_SEARCH_MODE_REPO_VAR: ${{ vars.SIMPLE_WEB_SEARCH_MODE }}
          CARRY_PREVIOUS_QA_INPUT: ${{ github.event.inputs.carry_previous_qa }}
          CARRY_PREVIOUS_QA_REPO_VAR: ${{ vars.CARRY_PREVIOUS_QA }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_EVENT_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [[ "$GH_ACTOR" == "github-actions[bot]" ]]; then
            echo "Skipping self-triggered run from github-actions[bot]."
            exit 0
          fi
          CHUNK_WORDS=2000
          MAX_CHUNKS=5
          MAX_WORDS=$((CHUNK_WORDS * MAX_CHUNKS))
          MEMORY_REUSE_ENABLED="${MEMORY_REUSE_ENABLED:-1}"
          MEMORY_MIN_SCORE="${MEMORY_MIN_SCORE:-8.5}"
          MEMORY_MIN_SIMILARITY="${MEMORY_MIN_SIMILARITY:-0.72}"
          MEMORY_REQUIRED_CONFIDENCE="${MEMORY_REQUIRED_CONFIDENCE:-high}"
          MEMORY_PROMOTION_MIN_SCORE="${MEMORY_PROMOTION_MIN_SCORE:-$MEMORY_MIN_SCORE}"
          SIMPLE_MODEL_CARRY_PREVIOUS_QA="${CARRY_PREVIOUS_QA_INPUT:-${CARRY_PREVIOUS_QA_REPO_VAR:-1}}"
          SIMPLE_MODEL_WEB_SEARCH_MODE="${SIMPLE_WEB_SEARCH_MODE_INPUT:-${SIMPLE_WEB_SEARCH_MODE_REPO_VAR:-time_sensitive_required}}"
          SIMPLE_MODEL_WEB_SEARCH_RETRIES="${SIMPLE_MODEL_WEB_SEARCH_RETRIES:-2}"
          export SIMPLE_MODEL_CARRY_PREVIOUS_QA
          export SIMPLE_MODEL_WEB_SEARCH_MODE
          export SIMPLE_MODEL_WEB_SEARCH_RETRIES
          PLAYWRIGHT_READY=0
          mkdir -p tmp responses errors responses_readable evaluations combined input/processed requests/old-requests responses/old-responses
          [[ -f chatgpt_file_playwright_anonymous_ci.py ]] || { echo "Missing chatgpt_file_playwright_anonymous_ci.py"; exit 1; }
          [[ -f tools/find_memory_reuse_candidate.py ]] || { echo "Missing tools/find_memory_reuse_candidate.py"; exit 1; }
          [[ -f tools/apply_promotion_policy.py ]] || { echo "Missing tools/apply_promotion_policy.py"; exit 1; }
          default_instructions_file="tmp/pipeline.instructions.txt"
          simple_instructions_file="tmp/pipeline.simple.instructions.txt"
          SYSTEM_PROMPT_FILE=".github/workflows/pipeline.system_prompt.txt"
          SIMPLE_PROMPT_FILE=".github/workflows/pipeline.simple_model_prompt.txt"
          EVAL_PROMPT_TEMPLATE_FILE=".github/workflows/pipeline.eval_prompt.template.txt"
          [[ -f "$SYSTEM_PROMPT_FILE" ]] || { echo "Missing $SYSTEM_PROMPT_FILE"; exit 1; }
          [[ -f "$EVAL_PROMPT_TEMPLATE_FILE" ]] || { echo "Missing $EVAL_PROMPT_TEMPLATE_FILE"; exit 1; }
          cp "$SYSTEM_PROMPT_FILE" "$default_instructions_file"
          if [[ -f "$SIMPLE_PROMPT_FILE" ]]; then
            cp "$SIMPLE_PROMPT_FILE" "$simple_instructions_file"
          else
            cp "$SYSTEM_PROMPT_FILE" "$simple_instructions_file"
          fi

          case "$SIMPLE_MODEL_WEB_SEARCH_MODE" in
            always_required)
              printf '%s\n' \
                '' \
                'Web Search Policy Override (highest priority):' \
                '- This override supersedes any conflicting web-search guidance above.' \
                '- For every user request, run live web search before answering.' \
                '- If live web search is unavailable in the current session, respond exactly with:' \
                'WEB_SEARCH_UNAVAILABLE' \
                '- Do not provide a best-effort answer when search is unavailable.' \
                >> "$simple_instructions_file"
              ;;
            time_sensitive_required)
              printf '%s\n' \
                '' \
                'Web Search Policy Override (highest priority):' \
                '- This override supersedes any conflicting web-search guidance above.' \
                '- For time-sensitive or recently changing topics (latest/recent/current/today, prices, releases, availability, news, schedules, rankings, product status), run live web search before answering.' \
                '- If live web search is unavailable for those requests, respond exactly with:' \
                'WEB_SEARCH_UNAVAILABLE' \
                '- Do not provide a best-effort answer for those requests when search is unavailable.' \
                >> "$simple_instructions_file"
              ;;
            default|*)
              ;;
          esac

          calculate_chunk_count() {
            local prompt_file="$1"
            python -c 'import math,re,sys; text=open(sys.argv[1],"r",encoding="utf-8").read(); chunk_words=int(sys.argv[2]); max_chunks=int(sys.argv[3]); max_words=chunk_words*max_chunks; word_count=len(re.findall(r"\S+", text)); print(f"ERR:{word_count}:{max_words}" if word_count>max_words else max(1, math.ceil(word_count/chunk_words)))' "$prompt_file" "$CHUNK_WORDS" "$MAX_CHUNKS"
          }

          first_100_words() {
            local source_file="$1"
            python -c 'import re,sys; text=open(sys.argv[1],"r",encoding="utf-8").read(); words=re.findall(r"\S+", text); print(" ".join(words[:100]).strip())' "$source_file"
          }

          render_eval_prompt() {
            local template_file="$1"
            local out_file="$2"
            local question_preview="$3"
            local job_id="$4"
            local now_iso="$5"
            python -c 'from pathlib import Path; import sys; template_path,out_path,question_preview,job_id,now_iso=sys.argv[1],sys.argv[2],sys.argv[3],sys.argv[4],sys.argv[5]; text=Path(template_path).read_text(encoding="utf-8"); repl={"{{QUESTION_TEXT_PREVIEW}}":question_preview,"{{JOB_ID}}":job_id,"{{QUESTION_ID}}":f"q_{job_id}","{{RUN_ID}}":f"run_{job_id}","{{BRANCH_ID}}":"branch_01","{{RESPONSE_OBJECT_ID}}":f"resp_{job_id}","{{PHASE}}":"1","{{JUDGE_MODEL}}":"chatgpt-playwright","{{NOW_ISO_UTC}}":now_iso}; [text:=text.replace(k,v) for k,v in repl.items()]; Path(out_path).write_text(text, encoding="utf-8")' "$template_file" "$out_file" "$question_preview" "$job_id" "$now_iso"
          }

          find_memory_reuse_candidate() {
            local question_file="$1"
            local current_job_id="$2"
            local out_file="$3"
            python tools/find_memory_reuse_candidate.py \
              --question-file "$question_file" \
              --current-job-id "$current_job_id" \
              --min-score "$MEMORY_MIN_SCORE" \
              --min-similarity "$MEMORY_MIN_SIMILARITY" \
              --required-confidence "$MEMORY_REQUIRED_CONFIDENCE" \
              --out-file "$out_file"
          }

          apply_promotion_policy() {
            local eval_file="$1"
            python tools/apply_promotion_policy.py \
              --eval-file "$eval_file" \
              --min-score "$MEMORY_PROMOTION_MIN_SCORE" \
              --required-confidence "$MEMORY_REQUIRED_CONFIDENCE"
          }

          ensure_playwright() {
            if [[ "$PLAYWRIGHT_READY" == "1" ]]; then
              return 0
            fi
            if ! command -v xvfb-run >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y xvfb
            fi
            if ! python -c 'import playwright' >/dev/null 2>&1; then
              python -m pip install --upgrade pip
              pip install playwright
            fi
            python -m playwright install --with-deps chromium
            PLAYWRIGHT_READY=1
          }

          move_with_dedupe() {
            local src="$1"
            local dest_dir="$2"
            local base
            local stem
            local ext
            local ts
            local dest

            [[ -f "$src" ]] || return 0
            mkdir -p "$dest_dir"
            base="$(basename "$src")"
            stem="${base%.*}"
            ext="${base##*.}"
            if [[ "$ext" == "$base" ]]; then
              ext=""
            else
              ext=".${ext}"
            fi
            dest="${dest_dir}/${base}"
            if [[ -e "$dest" ]]; then
              ts="$(date -u +%Y%m%dT%H%M%SZ)"
              dest="${dest_dir}/${stem}_${ts}${ext}"
            fi
            mv "$src" "$dest"
          }

          archive_old_request_response_files() {
            local keep_request="$1"
            local keep_response="$2"

            shopt -s nullglob
            for req in requests/job_*.json; do
              [[ "$req" == "$keep_request" ]] && continue
              move_with_dedupe "$req" "requests/old-requests"
            done
            for resp in responses/job_*.json; do
              [[ "$resp" == "$keep_response" ]] && continue
              move_with_dedupe "$resp" "responses/old-responses"
            done
            shopt -u nullglob
          }

          process_prompt() {
            local job_id="$1"
            local prompt_file="$2"
            local out_file="$3"
            local input_committed_at="$4"
            local started_at="$5"
            local chunk_count="${6:-1}"
            local instructions_file="${7:-$default_instructions_file}"
            local question_source_file="${8:-$prompt_file}"
            local simple_mode="${9:-0}"
            local startup_only="${10:-0}"
            local -a chunk_args=()
            local -a instruction_args=()

            if [[ "${chunk_count}" -gt 1 ]]; then
              chunk_args+=(--chunks "$chunk_count" --finalize-on-last-chunk --no-map-reduce)
              echo "Auto-chunk enabled for ${job_id}: ${chunk_count} chunks (${CHUNK_WORDS} words/chunk max)"
            fi
            if [[ -f "$instructions_file" ]]; then
              instruction_args+=(--instructions-file "$instructions_file")
            fi

            if [[ ! -f "$question_source_file" ]]; then
              question_source_file="$prompt_file"
            fi

            if [[ "$simple_mode" == "1" ]]; then
              if [[ "$startup_only" == "1" ]]; then
                echo "Detected OpenClaw startup housekeeping prompt for ${job_id}; returning NO_REPLY without Playwright."
                python -c 'import json,sys; from datetime import datetime,timezone; job_id,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3]; content="NO_REPLY"; completed_dt=datetime.now(timezone.utc).replace(microsecond=0); completed_at=completed_dt.isoformat().replace("+00:00","Z"); ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); basis=(ts or ss); basis_dt=(datetime.fromisoformat(basis.replace("Z","+00:00")) if basis else None); basis_dt=(basis_dt.replace(tzinfo=timezone.utc) if (basis_dt is not None and basis_dt.tzinfo is None) else basis_dt); elapsed_seconds=(max(0,int((completed_dt-basis_dt.astimezone(timezone.utc)).total_seconds())) if basis_dt is not None else None); payload={"job_id":job_id,"message":{"role":"assistant","content":content},"done":True,"input_committed_at":(ts or None),"started_at":(ss or None),"elapsed_seconds":elapsed_seconds,"completed_at":completed_at}; open(f"responses/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at"
                return 0
              fi
              echo "Simple mode enabled for ${job_id}: skipping memory reuse and evaluation."
              ensure_playwright
              web_retry_max=0
              if [[ "$SIMPLE_MODEL_WEB_SEARCH_MODE" != "default" ]]; then
                web_retry_max="$SIMPLE_MODEL_WEB_SEARCH_RETRIES"
              fi
              attempt=0
              playwright_status=1
              while true; do
                attempt=$((attempt + 1))
                if xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
                  python chatgpt_file_playwright_anonymous_ci.py \
                  --input-file "$prompt_file" \
                  "${instruction_args[@]}" \
                  --output-file "$out_file" \
                  --start-new-chat \
                  --wait-seconds 45 \
                  --timeout-ms 120000 \
                  --post-response-wait-seconds 1 \
                  --response-settle-seconds 2 \
                  --max-settle-wait-seconds 25 \
                  "${chunk_args[@]}"
                then
                  playwright_status=0
                else
                  playwright_status=$?
                fi

                web_unavailable=0
                if [[ -s "$out_file" ]]; then
                  if grep -q "WEB_SEARCH_UNAVAILABLE" "$out_file"; then
                    web_unavailable=1
                  elif grep -Eiq "need to be logged in to chatgpt|to use python in chatgpt|you can (easily )?run this script on your local machine|i (do not|don't) have live web access|i (can't|cannot) (access|use) (the )?(live )?web|web search (is )?unavailable" "$out_file"; then
                    # Browser fallback text from unauthenticated web/tool paths.
                    # Treat as unavailable so retry/error flow is consistent.
                    web_unavailable=1
                    printf '%s\n' "WEB_SEARCH_UNAVAILABLE" > "$out_file"
                  fi
                fi

                if [[ "$web_unavailable" == "1" && "$attempt" -le "$web_retry_max" ]]; then
                  echo "WEB_SEARCH_UNAVAILABLE for ${job_id} (attempt ${attempt}/${web_retry_max}); retrying Playwright run..."
                  : > "$out_file"
                  sleep 2
                  continue
                fi
                break
              done

              if [[ "$playwright_status" -eq 0 ]]; then
                if grep -q "WEB_SEARCH_UNAVAILABLE" "$out_file"; then
                  python -c 'import json,sys; job_id,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3]; ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"started_at":(ss or None),"error":{"code":"WEB_SEARCH_UNAVAILABLE","message":"Live web search was required for this prompt but unavailable in the ChatGPT session."}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at"
                else
                  python -c 'import json,sys; from datetime import datetime,timezone; job_id,out_file,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3],sys.argv[4]; content=open(out_file,"r",encoding="utf-8").read().strip(); completed_dt=datetime.now(timezone.utc).replace(microsecond=0); completed_at=completed_dt.isoformat().replace("+00:00","Z"); ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); basis=(ts or ss); basis_dt=(datetime.fromisoformat(basis.replace("Z","+00:00")) if basis else None); basis_dt=(basis_dt.replace(tzinfo=timezone.utc) if (basis_dt is not None and basis_dt.tzinfo is None) else basis_dt); elapsed_seconds=(max(0,int((completed_dt-basis_dt.astimezone(timezone.utc)).total_seconds())) if basis_dt is not None else None); payload={"job_id":job_id,"message":{"role":"assistant","content":content},"done":True,"input_committed_at":(ts or None),"started_at":(ss or None),"elapsed_seconds":elapsed_seconds,"completed_at":completed_at}; open(f"responses/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$out_file" "$input_committed_at" "$started_at"
                fi
              else
                if [[ -s "$out_file" ]]; then
                  if grep -q "WEB_SEARCH_UNAVAILABLE" "$out_file"; then
                    python -c 'import json,sys; job_id,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3]; ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"started_at":(ss or None),"error":{"code":"WEB_SEARCH_UNAVAILABLE","message":"Live web search was required for this prompt but unavailable in the ChatGPT session."}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at"
                  else
                    python -c 'import json,sys; from datetime import datetime,timezone; job_id,out_file,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3],sys.argv[4]; content=open(out_file,"r",encoding="utf-8").read().strip(); completed_dt=datetime.now(timezone.utc).replace(microsecond=0); completed_at=completed_dt.isoformat().replace("+00:00","Z"); ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); basis=(ts or ss); basis_dt=(datetime.fromisoformat(basis.replace("Z","+00:00")) if basis else None); basis_dt=(basis_dt.replace(tzinfo=timezone.utc) if (basis_dt is not None and basis_dt.tzinfo is None) else basis_dt); elapsed_seconds=(max(0,int((completed_dt-basis_dt.astimezone(timezone.utc)).total_seconds())) if basis_dt is not None else None); payload={"job_id":job_id,"message":{"role":"assistant","content":content},"done":True,"input_committed_at":(ts or None),"started_at":(ss or None),"elapsed_seconds":elapsed_seconds,"completed_at":completed_at}; open(f"responses/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$out_file" "$input_committed_at" "$started_at"
                  fi
                else
                  python -c 'import json,sys; job_id,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3]; ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"started_at":(ss or None),"error":{"code":"PIPELINE_EXECUTION_ERROR","message":"chatgpt playwright step failed"}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at"
                fi
              fi
              return 0
            fi

            question_preview="$(first_100_words "$question_source_file")"
            eval_prompt_file="tmp/${job_id}.eval.prompt.txt"
            eval_out_file="tmp/${job_id}.eval.out.txt"
            eval_json_file="evaluations/eval_${job_id}.json"
            now_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            render_eval_prompt "$EVAL_PROMPT_TEMPLATE_FILE" "$eval_prompt_file" "$question_preview" "$job_id" "$now_iso"

            reuse_candidate_file="tmp/${job_id}.reuse.json"
            reuse_source_job=""
            if [[ "$MEMORY_REUSE_ENABLED" == "1" ]]; then
              find_memory_reuse_candidate "$question_source_file" "$job_id" "$reuse_candidate_file"
              reuse_source_job="$(python -c 'import json,sys; data=json.load(open(sys.argv[1],"r",encoding="utf-8")); print(str(data.get("source_job_id","")))' "$reuse_candidate_file")"
            fi

            if [[ -n "$reuse_source_job" ]]; then
              echo "Memory reuse hit for ${job_id}: source ${reuse_source_job}"
              python -c 'import json,sys; from datetime import datetime,timezone; cand_path,job_id,out_file,input_committed_at,started_at=sys.argv[1:6]; c=json.load(open(cand_path,"r",encoding="utf-8")); content=str(c.get("response_content") or "").strip(); open(out_file,"w",encoding="utf-8").write(content + ("\n" if content else "")); completed_dt=datetime.now(timezone.utc).replace(microsecond=0); completed_at=completed_dt.isoformat().replace("+00:00","Z"); ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); basis=(ts or ss); basis_dt=(datetime.fromisoformat(basis.replace("Z","+00:00")) if basis else None); basis_dt=(basis_dt.replace(tzinfo=timezone.utc) if (basis_dt is not None and basis_dt.tzinfo is None) else basis_dt); elapsed_seconds=(max(0,int((completed_dt-basis_dt.astimezone(timezone.utc)).total_seconds())) if basis_dt is not None else None); payload={"job_id":job_id,"message":{"role":"assistant","content":content},"done":True,"input_committed_at":(ts or None),"started_at":(ss or None),"elapsed_seconds":elapsed_seconds,"completed_at":completed_at,"memory_reuse":{"enabled":True,"source_job_id":c.get("source_job_id"),"source_path":c.get("source_path"),"score":c.get("score"),"confidence_band":c.get("confidence_band"),"similarity":c.get("similarity")}}; open(f"responses/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$reuse_candidate_file" "$job_id" "$out_file" "$input_committed_at" "$started_at"
              python -c 'import json,sys; from datetime import datetime,timezone; cand_path,out_path,job_id,qprev=sys.argv[1:5]; c=json.load(open(cand_path,"r",encoding="utf-8")); source_id=str(c.get("source_job_id") or "unknown"); now=datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00","Z"); score=float(c.get("score") or 0.0); sim=float(c.get("similarity") or 0.0); confidence=str(c.get("confidence_band") or "high"); dims={k:score for k in ("correctness","completeness","clarity","usefulness","groundedness","specificity")}; payload={"schema_version":"1.0","object_type":"evaluation","object_id":f"eval_{job_id}","phase":1,"status":"complete","created_at":now,"updated_at":now,"run_context":{"job_id":job_id,"question_id":f"q_{job_id}","run_id":f"run_{job_id}","branch_id":"branch_01","research_id":None,"parent_object_id":f"resp_{job_id}","root_object_id":f"q_{job_id}"},"content":{"question_text_preview":qprev,"categorization":{"topic_short":"","topic":"","topics":[],"keywords":[],"summary":"","language":"en","domain":"","subdomain":"","sensitivity":"public","recency_class":"stable"},"quality_flags":{"needs_web_verification":False,"missing_citations":False,"safety_or_policy_risk":False}},"metadata":{"title":None,"topic_short":"","topic":"","topics":[],"keywords":[],"summary":"","query_variants":[],"language":"en","domain":"","subdomain":"","sensitivity":"public","recency_class":"stable"},"scores":[{"score_event_id":f"score_evt_{job_id}","score_profile":"answer_score_profile","judge_type":"final_judge","judge_model":"memory-reuse","phase":1,"created_at":now,"dimensions":dims,"overall_score":score,"confidence_band":confidence,"notes":f"Reused high-scoring prior response from {source_id} (similarity={sim:.3f})."}],"judge":{"judge_type":"final_judge","judge_model":"memory-reuse","judge_version":"1.0"},"provenance":{"source_inputs":["question_preview","historical_combined"],"source_object_ids":[f"q_{job_id}",f"resp_{source_id}"],"source_paths":[c.get("source_path")]},"promotion":{"memory_eligible":False,"memory_tier":None,"promotion_reason":None,"blocked_reason":None,"effective_score":score},"links":{"repo_path":f"evaluations/eval_{job_id}.json","index_path":"indexes/evaluations_index.jsonl","source_paths":[c.get("source_path")],"related_object_ids":[f"q_{job_id}",f"resp_{source_id}"],"evaluation_path":f"evaluations/eval_{job_id}.json","final_path":None}}; open(out_path,"w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$reuse_candidate_file" "$eval_json_file" "$job_id" "$question_preview"
            else
              ensure_playwright
              web_retry_max=0
              if [[ "$SIMPLE_MODEL_WEB_SEARCH_MODE" != "default" ]]; then
                web_retry_max="$SIMPLE_MODEL_WEB_SEARCH_RETRIES"
              fi
              attempt=0
              playwright_status=1
              while true; do
                attempt=$((attempt + 1))
                if xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
                python chatgpt_file_playwright_anonymous_ci.py \
                --input-file "$prompt_file" \
                "${instruction_args[@]}" \
                --output-file "$out_file" \
                --start-new-chat \
                --followup-input-file "$eval_prompt_file" \
                --followup-output-file "$eval_out_file" \
                --wait-seconds 60 \
                --followup-wait-seconds 45 \
                --timeout-ms 120000 \
                "${chunk_args[@]}"
                then
                  playwright_status=0
                else
                  playwright_status=$?
                fi

                web_unavailable=0
                if [[ -s "$out_file" ]]; then
                  if grep -q "WEB_SEARCH_UNAVAILABLE" "$out_file"; then
                    web_unavailable=1
                  elif grep -Eiq "need to be logged in to chatgpt|to use python in chatgpt|you can (easily )?run this script on your local machine|i (do not|don't) have live web access|i (can't|cannot) (access|use) (the )?(live )?web|web search (is )?unavailable" "$out_file"; then
                    # Browser fallback text from unauthenticated web/tool paths.
                    # Treat as unavailable so retry/error flow is consistent.
                    web_unavailable=1
                    printf '%s\n' "WEB_SEARCH_UNAVAILABLE" > "$out_file"
                  fi
                fi

                if [[ "$web_unavailable" == "1" && "$attempt" -le "$web_retry_max" ]]; then
                  echo "WEB_SEARCH_UNAVAILABLE for ${job_id} (attempt ${attempt}/${web_retry_max}); retrying Playwright run..."
                  : > "$out_file"
                  : > "$eval_out_file"
                  sleep 2
                  continue
                fi
                break
              done

              if [[ "$playwright_status" -eq 0 ]]; then
                if grep -q "WEB_SEARCH_UNAVAILABLE" "$out_file"; then
                  python -c 'import json,sys; job_id,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3]; ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"started_at":(ss or None),"error":{"code":"WEB_SEARCH_UNAVAILABLE","message":"Live web search was required for this prompt but unavailable in the ChatGPT session."}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at"
                  cp "$out_file" "responses_readable/${job_id}.md"
                else
                  python -c 'import json,sys; from datetime import datetime,timezone; job_id,out_file,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3],sys.argv[4]; content=open(out_file,"r",encoding="utf-8").read().strip(); completed_dt=datetime.now(timezone.utc).replace(microsecond=0); completed_at=completed_dt.isoformat().replace("+00:00","Z"); ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); basis=(ts or ss); basis_dt=(datetime.fromisoformat(basis.replace("Z","+00:00")) if basis else None); basis_dt=(basis_dt.replace(tzinfo=timezone.utc) if (basis_dt is not None and basis_dt.tzinfo is None) else basis_dt); elapsed_seconds=(max(0,int((completed_dt-basis_dt.astimezone(timezone.utc)).total_seconds())) if basis_dt is not None else None); payload={"job_id":job_id,"message":{"role":"assistant","content":content},"done":True,"input_committed_at":(ts or None),"started_at":(ss or None),"elapsed_seconds":elapsed_seconds,"completed_at":completed_at}; open(f"responses/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$out_file" "$input_committed_at" "$started_at"
                  cp "$out_file" "responses_readable/${job_id}.md"
                  if python -c 'import json,re,sys; raw=open(sys.argv[1],"r",encoding="utf-8").read().strip(); out_path=sys.argv[2]; m=re.search(r"\{.*\}", raw, re.S); candidate=(m.group(0) if m else raw); parsed=json.loads(candidate); open(out_path,"w",encoding="utf-8").write(json.dumps(parsed, indent=2, ensure_ascii=False)+"\n")' "$eval_out_file" "$eval_json_file"
                  then
                    :
                  else
                    python -c 'import json,sys; from datetime import datetime,timezone; out_path,job_id,qprev,raw_path=sys.argv[1],sys.argv[2],sys.argv[3],sys.argv[4]; now=datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00","Z"); raw=(open(raw_path,"r",encoding="utf-8").read().strip() if __import__("pathlib").Path(raw_path).exists() else ""); payload={"schema_version":"1.0","object_type":"evaluation","object_id":f"eval_{job_id}","phase":1,"status":"failed","created_at":now,"updated_at":now,"run_context":{"job_id":job_id},"content":{"question_text_preview":qprev},"metadata":{"language":"en"},"scores":[],"judge":{"judge_type":"final_judge","judge_model":"chatgpt-playwright"},"provenance":{},"promotion":{"memory_eligible":False,"memory_tier":None,"promotion_reason":None,"blocked_reason":"evaluation_parse_failure","effective_score":None},"links":{"repo_path":f"evaluations/eval_{job_id}.json"},"error":{"code":"EVAL_INVALID_JSON","message":"Evaluation output was not valid JSON","raw_excerpt":raw[:1500]}}; open(out_path,"w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False)+"\n")' "$eval_json_file" "$job_id" "$question_preview" "$eval_out_file"
                  fi
                fi
              else
                if [[ -s "$out_file" ]]; then
                  if grep -q "WEB_SEARCH_UNAVAILABLE" "$out_file"; then
                    python -c 'import json,sys; job_id,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3]; ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"started_at":(ss or None),"error":{"code":"WEB_SEARCH_UNAVAILABLE","message":"Live web search was required for this prompt but unavailable in the ChatGPT session."}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at"
                    cp "$out_file" "responses_readable/${job_id}.md"
                  else
                    python -c 'import json,sys; from datetime import datetime,timezone; job_id,out_file,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3],sys.argv[4]; content=open(out_file,"r",encoding="utf-8").read().strip(); completed_dt=datetime.now(timezone.utc).replace(microsecond=0); completed_at=completed_dt.isoformat().replace("+00:00","Z"); ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); basis=(ts or ss); basis_dt=(datetime.fromisoformat(basis.replace("Z","+00:00")) if basis else None); basis_dt=(basis_dt.replace(tzinfo=timezone.utc) if (basis_dt is not None and basis_dt.tzinfo is None) else basis_dt); elapsed_seconds=(max(0,int((completed_dt-basis_dt.astimezone(timezone.utc)).total_seconds())) if basis_dt is not None else None); payload={"job_id":job_id,"message":{"role":"assistant","content":content},"done":True,"input_committed_at":(ts or None),"started_at":(ss or None),"elapsed_seconds":elapsed_seconds,"completed_at":completed_at}; open(f"responses/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$out_file" "$input_committed_at" "$started_at"
                    cp "$out_file" "responses_readable/${job_id}.md"
                    python -c 'import json,sys; from datetime import datetime,timezone; out_path,job_id,qprev=sys.argv[1],sys.argv[2],sys.argv[3]; now=datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00","Z"); payload={"schema_version":"1.0","object_type":"evaluation","object_id":f"eval_{job_id}","phase":1,"status":"failed","created_at":now,"updated_at":now,"run_context":{"job_id":job_id},"content":{"question_text_preview":qprev},"metadata":{"language":"en"},"scores":[],"judge":{"judge_type":"final_judge","judge_model":"chatgpt-playwright"},"provenance":{},"promotion":{"memory_eligible":False,"memory_tier":None,"promotion_reason":None,"blocked_reason":"evaluation_step_failed","effective_score":None},"links":{"repo_path":f"evaluations/eval_{job_id}.json"},"error":{"code":"PIPELINE_EVALUATION_ERROR","message":"Evaluation prompt step failed in shared session"}}; open(out_path,"w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False)+"\n")' "$eval_json_file" "$job_id" "$question_preview"
                  fi
                else
                  python -c 'import json,sys; job_id,input_committed_at,started_at=sys.argv[1],sys.argv[2],sys.argv[3]; ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"started_at":(ss or None),"error":{"code":"PIPELINE_EXECUTION_ERROR","message":"chatgpt playwright step failed"}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at"
                fi
              fi
            fi

            apply_promotion_policy "$eval_json_file"

            python -c 'import json,sys; from datetime import datetime,timezone; from pathlib import Path; job_id,resp_path,err_path,eval_path,out_path=sys.argv[1:6]; load=lambda p: (json.load(open(p,"r",encoding="utf-8")) if Path(p).exists() else None); response=load(resp_path); error=load(err_path); evaluation=load(eval_path); scores=evaluation.get("scores") if isinstance(evaluation,dict) else None; first=(scores[0] if isinstance(scores,list) and scores and isinstance(scores[0],dict) else {}); promotion=evaluation.get("promotion") if isinstance(evaluation,dict) and isinstance(evaluation.get("promotion"),dict) else {}; now=datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00","Z"); status=("completed" if isinstance(response,dict) and not isinstance(error,dict) else "failed"); payload={"job_id":job_id,"status":status,"created_at":now,"response":response,"evaluation":evaluation,"error":error,"score_summary":{"overall_score":first.get("overall_score"),"confidence_band":first.get("confidence_band"),"memory_eligible":promotion.get("memory_eligible"),"memory_tier":promotion.get("memory_tier")},"paths":{"response":resp_path,"evaluation":eval_path,"error":err_path,"combined":out_path}}; open(out_path,"w",encoding="utf-8").write(json.dumps(payload,indent=2,ensure_ascii=False)+"\n")' "$job_id" "responses/${job_id}.json" "errors/${job_id}.json" "evaluations/eval_${job_id}.json" "combined/${job_id}.json"
          }

          PROMPT_TEXT="${PROMPT_TEXT_INPUT:-}"
          if [[ -n "${PROMPT_TEXT// }" ]]; then
            job_id="job_dispatch_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
            prompt_file="tmp/${job_id}.prompt.txt"
            out_file="tmp/${job_id}.out.txt"
            question_file="tmp/${job_id}.question.txt"
            started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf '%s' "$PROMPT_TEXT" > "$prompt_file"
            printf '%s' "$PROMPT_TEXT" > "$question_file"
            chunk_count="$(calculate_chunk_count "$prompt_file")"
            if [[ "$chunk_count" == ERR:* ]]; then
              IFS=':' read -r _ word_count max_words <<< "$chunk_count"
              python -c 'import json,sys; job_id,word_count,max_words,started_at=sys.argv[1],int(sys.argv[2]),int(sys.argv[3]),sys.argv[4]; payload={"job_id":job_id,"input_committed_at":None,"started_at":started_at,"error":{"code":"PROMPT_TOO_LARGE","message":f"Prompt has {word_count} words and exceeds max {max_words} words.","limits":{"prompt_chunk_words":2000,"prompt_max_chunks":5,"prompt_max_words":max_words},"word_count":word_count}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$word_count" "$max_words" "$started_at"
              echo "Dispatch prompt too large (${word_count} > ${max_words}). Error artifact written."
              exit 0
            fi
            echo "Processing workflow_dispatch prompt_text as ${job_id}"
            process_prompt "$job_id" "$prompt_file" "$out_file" "" "$started_at" "$chunk_count" "$default_instructions_file" "$question_file"
            exit 0
          fi

          if [[ "$GH_EVENT_NAME" == "push" ]]; then
            BEFORE="$GH_EVENT_BEFORE"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
              CANDIDATES="$(git diff --name-only "$BEFORE" "$GH_SHA" -- 'input/*.txt' 'requests/job_*.json' || true)"
            else
              CANDIDATES="$( { git ls-files 'input/*.txt' || true; git ls-files 'requests/job_*.json' || true; } | sort -u )"
            fi
          else
            CANDIDATES="$( { git ls-files 'input/*.txt' || true; git ls-files 'requests/job_*.json' || true; } | sort -u )"
          fi

          CHANGED=""
          while IFS= read -r req; do
            [[ -z "$req" ]] && continue
            [[ "$req" == input/processed/* ]] && continue
            [[ -f "$req" ]] || continue
            if [[ "$req" == requests/job_*.json ]]; then
              job_id="$(basename "$req" .json)"
              [[ -f "responses/${job_id}.json" ]] && continue
              [[ -f "errors/${job_id}.json" ]] && continue
            fi
            CHANGED+="${req}"$'\n'
          done <<< "$CANDIDATES"

          if [[ -z "${CHANGED// }" ]]; then
            echo "No pending input/request files to process."
            exit 0
          fi

          LAST_REQUEST_FILE=""
          LAST_RESPONSE_FILE=""

          while IFS= read -r req; do
            [[ -z "$req" ]] && continue
            [[ -f "$req" ]] || continue
            if [[ "$req" == requests/job_*.json ]]; then
              job_id="$(basename "$req" .json)"
              prompt_file="tmp/${job_id}.prompt.txt"
              out_file="tmp/${job_id}.out.txt"
              question_file="tmp/${job_id}.question.txt"
              model_file="tmp/${job_id}.model.txt"
              startup_file="tmp/${job_id}.startup.txt"
              input_committed_at="$(git log -1 --format=%cI -- "$req" 2>/dev/null || true)"
              started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

              python .github/workflows/extract_request_prompt.py "$req" "$prompt_file" "$question_file" "$model_file" "$startup_file"
              chunk_count="$(calculate_chunk_count "$prompt_file")"
              if [[ "$chunk_count" == ERR:* ]]; then
                IFS=':' read -r _ word_count max_words <<< "$chunk_count"
                python -c 'import json,sys; job_id,input_committed_at,started_at,word_count,max_words=sys.argv[1],sys.argv[2],sys.argv[3],int(sys.argv[4]),int(sys.argv[5]); ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"started_at":(ss or None),"error":{"code":"PROMPT_TOO_LARGE","message":f"Prompt has {word_count} words and exceeds max {max_words} words.","limits":{"prompt_chunk_words":2000,"prompt_max_chunks":5,"prompt_max_words":max_words},"word_count":word_count}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at" "$word_count" "$max_words"
                echo "Skipping ${req}: prompt too large (${word_count} > ${max_words})"
                continue
              fi

              echo "Processing ${req} as ${job_id}"
              model_name="$(cat "$model_file" 2>/dev/null || true)"
              simple_mode="0"
              startup_only="0"
              if [[ "$model_name" == "git-chatgpt" ]]; then
                simple_mode="1"
              fi
              startup_only="$(cat "$startup_file" 2>/dev/null || echo "0")"
              selected_instructions_file="$default_instructions_file"
              if [[ "$simple_mode" == "1" ]]; then
                selected_instructions_file="$simple_instructions_file"
              fi
              process_prompt "$job_id" "$prompt_file" "$out_file" "$input_committed_at" "$started_at" "$chunk_count" "$selected_instructions_file" "$question_file" "$simple_mode" "$startup_only"
              LAST_REQUEST_FILE="$req"
              if [[ -f "responses/${job_id}.json" ]]; then
                LAST_RESPONSE_FILE="responses/${job_id}.json"
              fi
            else
              base_name="$(basename "$req")"
              stem="${base_name%.txt}"
              safe_stem="$(printf '%s' "$stem" | tr -cs 'A-Za-z0-9._-' '_')"
              job_id="job_${safe_stem}"
              prompt_file="tmp/${job_id}.prompt.txt"
              out_file="tmp/${job_id}.out.txt"
              input_committed_at="$(git log -1 --format=%cI -- "$req" 2>/dev/null || true)"
              started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

              cp "$req" "$prompt_file"
              question_file="$prompt_file"
              chunk_count="$(calculate_chunk_count "$prompt_file")"
              if [[ "$chunk_count" == ERR:* ]]; then
                IFS=':' read -r _ word_count max_words <<< "$chunk_count"
                python -c 'import json,sys; job_id,input_committed_at,started_at,word_count,max_words=sys.argv[1],sys.argv[2],sys.argv[3],int(sys.argv[4]),int(sys.argv[5]); ts=(input_committed_at or "").strip(); ss=(started_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"started_at":(ss or None),"error":{"code":"PROMPT_TOO_LARGE","message":f"Prompt has {word_count} words and exceeds max {max_words} words.","limits":{"prompt_chunk_words":2000,"prompt_max_chunks":5,"prompt_max_words":max_words},"word_count":word_count}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at" "$started_at" "$word_count" "$max_words"
                echo "Skipping ${req}: prompt too large (${word_count} > ${max_words})"
              else
                echo "Processing ${req} as ${job_id}"
                process_prompt "$job_id" "$prompt_file" "$out_file" "$input_committed_at" "$started_at" "$chunk_count" "$default_instructions_file" "$question_file"
                if [[ -f "responses/${job_id}.json" ]]; then
                  LAST_RESPONSE_FILE="responses/${job_id}.json"
                fi
              fi

              target="input/processed/${base_name}"
              if [[ -e "$target" ]]; then
                ts="$(date -u +%Y%m%dT%H%M%SZ)"
                target="input/processed/${stem}_${ts}.txt"
              fi
              mv "$req" "$target"
            fi
          done <<< "$CHANGED"

          archive_old_request_response_files "$LAST_REQUEST_FILE" "$LAST_RESPONSE_FILE"

      - name: Upload Playwright diagnostics
        if: ${{ failure() || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifacts == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            chatgpt_playwright_error.png
            chatgpt_playwright_error.html
            chatgpt_network.log
            tmp/*.out.txt
            errors/*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and push artifacts
        run: |
          set -euo pipefail
          git config user.name "git-inference-pipeline"
          git config user.email "git-inference-pipeline@users.noreply.github.com"
          git add input requests responses errors responses_readable evaluations combined
          git diff --cached --quiet && exit 0
          git commit -m "pipeline: process prompts and archive inputs [skip ci]"
          if git push origin HEAD:main; then
            exit 0
          fi
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying..."
            sleep 2
          done
          echo "Failed to push after retries."
          exit 1




