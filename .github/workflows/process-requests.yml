          import json, sys
          from pathlib import Path
          job_id, started_at = sys.argv[1:3]
          payload = {
              "job_id": job_id,
              "started_at": started_at,
              "error": {
                  "code": "RESEARCH_NOT_IMPLEMENTED",
                  "message": "Research routing was detected but the dedicated research pipeline is not implemented in this workflow yet."
              }
          }
          Path(f"errors/{job_id}.json").write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
                terminal_state="failed"

              else
                write_status "$job_id" "failed" "$intent_type" "$task_type" "router_invalid"
                python - "$job_id" "$started_at" <<'PY'
          import json, sys
          from pathlib import Path
          job_id, started_at = sys.argv[1:3]
          payload = {
              "job_id": job_id,
              "started_at": started_at,
              "error": {
                  "code": "ROUTER_INVALID_INTENT",
                  "message": "Router returned an unsupported intent_type."
              }
          }
          Path(f"errors/{job_id}.json").write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
                terminal_state="failed"
              fi
            fi

            if [[ "$terminal_state" == "completed" && -f "responses/${job_id}.json" ]]; then
              local question_preview
              question_preview="$(python - "$user_prompt_file" <<'PY'
          import re, sys
          text = open(sys.argv[1], "r", encoding="utf-8").read()
          words = re.findall(r"\S+", text)
          print(" ".join(words[:100]).strip())
          PY
          )"
              render_eval_prompt "$EVAL_PROMPT_TEMPLATE_FILE" "$eval_prompt" "$question_preview" "$job_id" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              call_playwright_stage "evaluation" "$ANSWERER_PROMPT_FILE" "$eval_prompt" "$eval_out" false false || true
              if validate_json "$eval_out" > "$eval_json"; then
                :
              else
                python - "$job_id" "$eval_json" "$eval_out" <<'PY'
          import json, sys
          from pathlib import Path
          from datetime import datetime, timezone
          job_id, eval_json, eval_out = sys.argv[1:4]
          raw = Path(eval_out).read_text(encoding="utf-8").strip() if Path(eval_out).exists() else ""
          now = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          payload = {
              "schema_version": "1.0",
              "object_type": "evaluation",
              "object_id": f"eval_{job_id}",
              "phase": 2,
              "status": "failed",
              "created_at": now,
              "updated_at": now,
              "run_context": {"job_id": job_id},
              "content": {
                  "question_text_preview": "",
                  "categorization": {"recency_class": "stable"},
                  "quality_flags": {
                      "needs_web_verification": False,
                      "missing_citations": False,
                      "safety_or_policy_risk": False,
                  },
              },
              "metadata": {"language": "en"},
              "scores": [],
              "judge": {
                  "judge_type": "final_judge",
                  "judge_model": "chatgpt-playwright",
                  "judge_version": "1.0",
              },
              "provenance": {},
              "promotion": {
                  "memory_eligible": False,
                  "memory_tier": None,
                  "promotion_reason": None,
                  "blocked_reason": "evaluation_parse_failure",
                  "effective_score": None,
              },
              "links": {"repo_path": f"evaluations/eval_{job_id}.json"},
              "error": {
                  "code": "EVAL_INVALID_JSON",
                  "message": "Evaluation output was not valid JSON",
                  "raw_excerpt": raw[:1500],
              },
          }
          Path(eval_json).write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
              fi
              apply_promotion_policy "$eval_json"
              write_status "$job_id" "completed" "$intent_type" "$task_type" "complete"
            fi

            finalize_combined "$job_id"
          }

          move_with_dedupe() {
            local src="$1"
            local dest_dir="$2"
            [[ -f "$src" ]] || return 0
            mkdir -p "$dest_dir"
            local base stem ext dest ts
            base="$(basename "$src")"
            stem="${base%.*}"
            ext="${base##*.}"
            if [[ "$ext" == "$base" ]]; then
              ext=""
            else
              ext=".${ext}"
            fi
            dest="${dest_dir}/${base}"
            if [[ -e "$dest" ]]; then
              ts="$(date -u +%Y%m%dT%H%M%SZ)"
              dest="${dest_dir}/${stem}_${ts}${ext}"
            fi
            mv "$src" "$dest"
          }

          archive_old_request_response_files() {
            local keep_request="$1"
            local keep_response="$2"
            shopt -s nullglob
            for req in requests/job_*.json; do
              [[ "$req" == "$keep_request" ]] && continue
              move_with_dedupe "$req" "requests/old-requests"
            done
            for resp in responses/job_*.json; do
              [[ "$resp" == "$keep_response" ]] && continue
              move_with_dedupe "$resp" "responses/old-responses"
            done
            shopt -u nullglob
          }

          PROMPT_TEXT="${PROMPT_TEXT_INPUT:-}"
          if [[ -n "${PROMPT_TEXT// }" ]]; then
            job_id="job_dispatch_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
            prompt_file="tmp/${job_id}.prompt.txt"
            started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf '%s' "$PROMPT_TEXT" > "$prompt_file"
            process_request_option_b "$job_id" "$prompt_file" "$started_at" ""
            exit 0
          fi

          if [[ "$GH_EVENT_NAME" == "push" ]]; then
            BEFORE="$GH_EVENT_BEFORE"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
              CANDIDATES="$(git diff --name-only "$BEFORE" "$GH_SHA" -- 'input/*.txt' 'requests/job_*.json' || true)"
            else
              CANDIDATES="$( { git ls-files 'input/*.txt' || true; git ls-files 'requests/job_*.json' || true; } | sort -u )"
            fi
          else
            CANDIDATES="$( { git ls-files 'input/*.txt' || true; git ls-files 'requests/job_*.json' || true; } | sort -u )"
          fi

          CHANGED=""
          while IFS= read -r req; do
            [[ -z "$req" ]] && continue
            [[ "$req" == input/processed/* ]] && continue
            [[ -f "$req" ]] || continue
            CHANGED+="${req}"$'\n'
          done <<< "$CANDIDATES"

          if [[ -z "${CHANGED// }" ]]; then
            echo "No pending input/request files to process."
            exit 0
          fi

          LAST_REQUEST_FILE=""
          LAST_RESPONSE_FILE=""

          while IFS= read -r req; do
            [[ -z "$req" ]] && continue
            [[ -f "$req" ]] || continue

            if [[ "$req" == requests/job_*.json ]]; then
              job_id="$(basename "$req" .json)"
              prompt_file="tmp/${job_id}.prompt.txt"
              started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              context_file="tmp/${job_id}.context.json"
              python "$EXTRACT_CONTEXT_SCRIPT" "$req" "$prompt_file" "tmp/${job_id}.question.txt" "tmp/${job_id}.model.txt" "tmp/${job_id}.startup.txt" "$context_file"
              process_request_option_b "$job_id" "$prompt_file" "$started_at" "$context_file"
              LAST_REQUEST_FILE="$req"
              [[ -f "responses/${job_id}.json" ]] && LAST_RESPONSE_FILE="responses/${job_id}.json"
            else
              base_name="$(basename "$req")"
              stem="${base_name%.txt}"
              safe_stem="$(printf '%s' "$stem" | tr -cs 'A-Za-z0-9._-' '_')"
              job_id="job_${safe_stem}"
              prompt_file="tmp/${job_id}.prompt.txt"
              started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              cp "$req" "$prompt_file"
              process_request_option_b "$job_id" "$prompt_file" "$started_at" ""
              [[ -f "responses/${job_id}.json" ]] && LAST_RESPONSE_FILE="responses/${job_id}.json"
              move_with_dedupe "$req" "input/processed"
            fi
          done <<< "$CHANGED"

          archive_old_request_response_files "$LAST_REQUEST_FILE" "$LAST_RESPONSE_FILE"

      - name: Upload Playwright diagnostics
        if: ${{ failure() || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifacts == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            chatgpt_playwright_error*
            chatgpt_network.log
            perplexity_playwright_error*
            perplexity_network.log
            tmp/*.out.txt
            errors/*.json
            status/*.json
            stages/**/*
            execution/*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and push artifacts
        run: |
          set -euo pipefail
          git config user.name "git-inference-pipeline"
          git config user.email "git-inference-pipeline@users.noreply.github.com"
          git add input requests responses errors responses_readable evaluations combined status stages execution
          git diff --cached --quiet && exit 0
          git commit -m "pipeline: process prompts with staged orchestration [skip ci]"
          if git push origin HEAD:main; then
            exit 0
          fi
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying..."
            sleep 2
          done
          echo "Failed to push after retries."
          exit 1
