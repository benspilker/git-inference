name: Process Inference Requests

on:
  push:
    branches: [main]
    paths:
      - "input/*.txt"
  workflow_dispatch:
    inputs:
      prompt_text:
        description: "Prompt text to process immediately (optional)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: process-requests-main
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          set -euo pipefail
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Process prompts (bash)
        env:
          PROMPT_TEXT_INPUT: ${{ github.event.inputs.prompt_text }}
        run: |
          set -euo pipefail
          mkdir -p tmp responses errors responses_readable input/processed
          [[ -f chatgpt_file_playwright_anonymous_ci.py ]] || { echo "Missing chatgpt_file_playwright_anonymous_ci.py"; exit 1; }

          process_prompt() {
            local job_id="$1"
            local prompt_file="$2"
            local out_file="$3"
            local input_committed_at="$4"

            if xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
              python chatgpt_file_playwright_anonymous_ci.py \
              --input-file "$prompt_file" \
              --output-file "$out_file" \
              --incognito \
              --wait-seconds 60 \
              --timeout-ms 120000
            then
              python -c 'import json,sys; from datetime import datetime,timezone; job_id,out_file,input_committed_at=sys.argv[1],sys.argv[2],sys.argv[3]; content=open(out_file,"r",encoding="utf-8").read().strip(); completed_dt=datetime.now(timezone.utc).replace(microsecond=0); completed_at=completed_dt.isoformat().replace("+00:00","Z"); ts=(input_committed_at or "").strip(); input_dt=(datetime.fromisoformat(ts.replace("Z","+00:00")) if ts else None); input_dt=(input_dt.replace(tzinfo=timezone.utc) if (input_dt is not None and input_dt.tzinfo is None) else input_dt); elapsed_seconds=(max(0,int((completed_dt-input_dt.astimezone(timezone.utc)).total_seconds())) if input_dt is not None else None); payload={"job_id":job_id,"message":{"role":"assistant","content":content},"done":True,"input_committed_at":(ts or None),"elapsed_seconds":elapsed_seconds,"completed_at":completed_at}; open(f"responses/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$out_file" "$input_committed_at"
              cp "$out_file" "responses_readable/${job_id}.md"
            else
              python -c 'import json,sys; job_id,input_committed_at=sys.argv[1],sys.argv[2]; ts=(input_committed_at or "").strip(); payload={"job_id":job_id,"input_committed_at":(ts or None),"error":{"code":"PIPELINE_EXECUTION_ERROR","message":"chatgpt playwright step failed"}}; open(f"errors/{job_id}.json","w",encoding="utf-8").write(json.dumps(payload, indent=2, ensure_ascii=False) + "\n")' "$job_id" "$input_committed_at"
            fi
          }

          PROMPT_TEXT="${PROMPT_TEXT_INPUT:-}"
          if [[ -n "${PROMPT_TEXT// }" ]]; then
            job_id="job_dispatch_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
            prompt_file="tmp/${job_id}.prompt.txt"
            out_file="tmp/${job_id}.out.txt"
            printf '%s' "$PROMPT_TEXT" > "$prompt_file"
            echo "Processing workflow_dispatch prompt_text as ${job_id}"
            process_prompt "$job_id" "$prompt_file" "$out_file" ""
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
              CANDIDATES="$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'input/*.txt' || true)"
            else
              CANDIDATES="$(git ls-files 'input/*.txt' || true)"
            fi
          else
            CANDIDATES="$(git ls-files 'input/*.txt' || true)"
          fi

          CHANGED=""
          while IFS= read -r req; do
            [[ -z "$req" ]] && continue
            [[ "$req" == input/processed/* ]] && continue
            [[ -f "$req" ]] || continue
            CHANGED+="${req}"$'\n'
          done <<< "$CANDIDATES"

          if [[ -z "${CHANGED// }" ]]; then
            echo "No pending input text files to process."
            exit 0
          fi

          while IFS= read -r req; do
            [[ -z "$req" ]] && continue
            [[ -f "$req" ]] || continue
            base_name="$(basename "$req")"
            stem="${base_name%.txt}"
            safe_stem="$(printf '%s' "$stem" | tr -cs 'A-Za-z0-9._-' '_')"
            job_id="job_${safe_stem}"
            prompt_file="tmp/${job_id}.prompt.txt"
            out_file="tmp/${job_id}.out.txt"
            input_committed_at="$(git log -1 --format=%cI -- "$req" 2>/dev/null || true)"

            cp "$req" "$prompt_file"
            echo "Processing ${req} as ${job_id}"
            process_prompt "$job_id" "$prompt_file" "$out_file" "$input_committed_at"

            target="input/processed/${base_name}"
            if [[ -e "$target" ]]; then
              ts="$(date -u +%Y%m%dT%H%M%SZ)"
              target="input/processed/${stem}_${ts}.txt"
            fi
            mv "$req" "$target"
          done <<< "$CHANGED"

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            chatgpt_playwright_error.png
            chatgpt_playwright_error.html
            chatgpt_network.log
            tmp/*.out.txt
            responses_readable/*.md
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and push artifacts
        run: |
          set -euo pipefail
          git config user.name "git-inference-pipeline"
          git config user.email "git-inference-pipeline@users.noreply.github.com"
          git add input responses errors responses_readable
          git diff --cached --quiet && exit 0
          git commit -m "pipeline: process prompts and archive inputs [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying..."
            sleep 2
          done
          echo "Failed to push after retries."
          exit 1
