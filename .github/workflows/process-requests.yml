              }
              out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
              raise SystemExit(0)

          payload = {
              **base,
              "execution_status": "failed",
              "details": {
                  "code": "NO_EXECUTOR_IMPLEMENTED",
                  "message": f"No executor implemented for task_type: {task_type}",
