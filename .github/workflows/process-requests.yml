name: Process Inference Requests

on:
  push:
    branches: [main]
    paths:
      - "input/*.txt"
      - "requests/job_*.json"
      - "stages/**/*.request.json"
  workflow_dispatch:
    inputs:
      prompt_text:
        description: "Prompt text to process immediately (optional)"
        required: false
        type: string
      playwright_engine:
        description: "Playwright browser engine"
        required: false
        default: "chatgpt"
        type: choice
        options:
          - "chatgpt"
          - "perplexity"
      upload_artifacts:
        description: "Upload diagnostics artifacts even on success"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: process-requests-main
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-noble
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r .github/workflows/requirements-playwright.txt

      - name: Process requests with staged orchestration
        env:
          PROMPT_TEXT_INPUT: ${{ github.event.inputs.prompt_text }}
          PLAYWRIGHT_ENGINE_INPUT: ${{ github.event.inputs.playwright_engine }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_EVENT_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [[ "$GH_ACTOR" == "github-actions[bot]" ]]; then
            echo "Skipping self-triggered run from github-actions[bot]."
            exit 0
          fi

          mkdir -p             tmp             input/processed             requests             requests/old-requests             responses             responses/old-responses             responses_readable             errors             evaluations             combined             status             stages             execution
          rm -rf tmp/playwright-profiles || true
          mkdir -p tmp/playwright-profiles

          PLAYWRIGHT_ENGINE="${PLAYWRIGHT_ENGINE:-${PLAYWRIGHT_ENGINE_INPUT:-chatgpt}}"
          PLAYWRIGHT_RUNNER_FILE="chatgpt_file_playwright_anonymous_ci.py"
          if [[ "$PLAYWRIGHT_ENGINE" == "perplexity" ]]; then
            PLAYWRIGHT_RUNNER_FILE="perplexity_file_playwright_anonymous_ci.py"
          fi
          PLAYWRIGHT_RUNNER_FILE_OVERRIDE=""
          WEATHER_FALLBACK_SCRIPT="tools/weather_fallback_openmeteo.py"
          EXTRACT_CONTEXT_SCRIPT=".github/workflows/extract_request_context.py"
          echo "Playwright engine: $PLAYWRIGHT_ENGINE"
          echo "Playwright runner: $PLAYWRIGHT_RUNNER_FILE"
          [[ -f "$PLAYWRIGHT_RUNNER_FILE" ]] || { echo "Missing $PLAYWRIGHT_RUNNER_FILE"; exit 1; }
          [[ -f "$WEATHER_FALLBACK_SCRIPT" ]] || { echo "Missing $WEATHER_FALLBACK_SCRIPT"; exit 1; }
          [[ -f "$EXTRACT_CONTEXT_SCRIPT" ]] || { echo "Missing $EXTRACT_CONTEXT_SCRIPT"; exit 1; }

          ROUTER_PROMPT_FILE=".github/workflows/pipeline.router_prompt.txt"
          PLANNER_PROMPT_FILE=".github/workflows/pipeline.planner_prompt.txt"
          ANSWERER_PROMPT_FILE=".github/workflows/pipeline.answerer_prompt.txt"
          SYSTEM_TEST_PROMPT_FILE=".github/workflows/pipeline.system_test_prompt.txt"
          FINAL_PHRASER_PROMPT_FILE=".github/workflows/pipeline.final_phraser_prompt.txt"
          EVAL_PROMPT_TEMPLATE_FILE=".github/workflows/pipeline.eval_prompt.template.txt"

          [[ -f "$ROUTER_PROMPT_FILE" ]] || { echo "Missing $ROUTER_PROMPT_FILE"; exit 1; }
          [[ -f "$PLANNER_PROMPT_FILE" ]] || { echo "Missing $PLANNER_PROMPT_FILE"; exit 1; }
          [[ -f "$ANSWERER_PROMPT_FILE" ]] || { echo "Missing $ANSWERER_PROMPT_FILE"; exit 1; }
          [[ -f "$SYSTEM_TEST_PROMPT_FILE" ]] || { echo "Missing $SYSTEM_TEST_PROMPT_FILE"; exit 1; }
          [[ -f "$FINAL_PHRASER_PROMPT_FILE" ]] || { echo "Missing $FINAL_PHRASER_PROMPT_FILE"; exit 1; }
          [[ -f "$EVAL_PROMPT_TEMPLATE_FILE" ]] || { echo "Missing $EVAL_PROMPT_TEMPLATE_FILE"; exit 1; }

          MEMORY_MIN_SCORE="${MEMORY_MIN_SCORE:-8.5}"
          MEMORY_MIN_SIMILARITY="${MEMORY_MIN_SIMILARITY:-0.72}"
          MEMORY_REQUIRED_CONFIDENCE="${MEMORY_REQUIRED_CONFIDENCE:-high}"
          MEMORY_PROMOTION_MIN_SCORE="${MEMORY_PROMOTION_MIN_SCORE:-$MEMORY_MIN_SCORE}"
          STAGE_MAX_ATTEMPTS="${STAGE_MAX_ATTEMPTS:-2}"
          STAGE_WEB_MAX_ATTEMPTS="${STAGE_WEB_MAX_ATTEMPTS:-3}"
          [[ -f tools/find_memory_reuse_candidate.py ]] || { echo "Missing tools/find_memory_reuse_candidate.py"; exit 1; }
          [[ -f tools/apply_promotion_policy.py ]] || { echo "Missing tools/apply_promotion_policy.py"; exit 1; }

          write_status() {
            local job_id="$1"
            local state="$2"
            local intent_type="${3:-}"
            local task_type="${4:-}"
            local current_stage="${5:-}"
            python - "$job_id" "$state" "$intent_type" "$task_type" "$current_stage" <<'PY'
          import json, sys
          from pathlib import Path
          from datetime import datetime, timezone
          job_id, state, intent_type, task_type, current_stage = sys.argv[1:6]
          path = Path("status") / f"{job_id}.json"
          data = {}
          if path.exists():
              data = json.loads(path.read_text(encoding="utf-8"))
          data.update({
              "job_id": job_id,
              "state": state,
              "intent_type": intent_type or data.get("intent_type"),
              "task_type": task_type or data.get("task_type"),
              "current_stage": current_stage or data.get("current_stage"),
              "updated_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00","Z"),
          })
          if "created_at" not in data:
              data["created_at"] = data["updated_at"]
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
          }

          write_stage_output() {
            local job_id="$1"
            local stage="$2"
            local src="$3"
            mkdir -p "stages/${job_id}"
            cp "$src" "stages/${job_id}/${stage}.txt"
          }

          write_stage_result_json() {
            local job_id="$1"
            local stage="$2"
            local src="$3"
            local force_json="${4:-false}"
            mkdir -p "stages/${job_id}"
            python - "$job_id" "$stage" "$src" "$force_json" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          job_id, stage, src, force_json = sys.argv[1:5]
          src_path = Path(src)
          raw = src_path.read_text(encoding="utf-8").strip() if src_path.exists() else ""
          payload = None

          if force_json.lower() == "true":
              payload = json.loads(raw) if raw else {}
          else:
              # Best effort: extract first JSON object from mixed text.
              match = re.search(r"\{.*\}", raw, re.S)
              if match:
                  try:
                      candidate = json.loads(match.group(0))
                      if isinstance(candidate, dict):
                          payload = candidate
                  except Exception:
                      payload = None

          if not isinstance(payload, dict):
              payload = {"response": raw}

          out_path = Path("stages") / job_id / f"{stage}.result.json"
          out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
          }

          resolve_playwright_runner_for_model() {
            local model_name="$1"
            case "$model_name" in
              git-perplexity|git-perplexity-json|*/git-perplexity|*/git-perplexity-json)
                echo "perplexity_file_playwright_anonymous_ci.py"
                ;;
              *)
                echo "chatgpt_file_playwright_anonymous_ci.py"
                ;;
            esac
          }

          call_playwright_stage() {
            local stage="$1"
            local stage_prompt_file="$2"
            local input_payload_file="$3"
            local output_file="$4"
            local expect_json="${5:-false}"
            local require_live_web="${6:-false}"
            local max_attempts_override="${7:-}"
            local stage_chunks="${8:-1}"
            local stage_chunk_mode="${9:-none}"
            local runner_file="${PLAYWRIGHT_RUNNER_FILE_OVERRIDE:-$PLAYWRIGHT_RUNNER_FILE}"

            local attempts="${STAGE_MAX_ATTEMPTS:-2}"
            if [[ "$require_live_web" == "true" ]]; then
              attempts="${STAGE_WEB_MAX_ATTEMPTS:-3}"
            fi
            if [[ -n "$max_attempts_override" ]]; then
              attempts="$max_attempts_override"
            fi

            local attempt=1
            while (( attempt <= attempts )); do
              local meta_file
              meta_file="${output_file}.meta.json"
              local profile_dir
              profile_dir="tmp/playwright-profiles/${job_id}/${stage}/attempt-${attempt}"
              rm -rf "$profile_dir"
              mkdir -p "$profile_dir"

              local extra_flags=()
              if (( attempt > 1 )); then
                extra_flags+=(--refresh-before-send --start-new-chat)
              else
                extra_flags+=(--start-new-chat)
              fi

              local json_flags=()
              if [[ "$expect_json" == "true" ]]; then
                json_flags+=(--expect-json --fail-if-invalid-json)
              fi

              if xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
                python "$runner_file" \
                --stage-name "$stage" \
                --instructions-file "$stage_prompt_file" \
                --input-file "$input_payload_file" \
                --output-file "$output_file" \
                --metadata-output-file "$meta_file" \
                --user-data-dir "$profile_dir" \
                --allow-retry \
                --refresh-before-retry \
                --wait-seconds 45 \
                --timeout-ms 120000 \
                --post-response-wait-seconds 1 \
                --response-settle-seconds 2 \
                --max-settle-wait-seconds 25 \
                --chunks "$stage_chunks" \
                --chunk-mode "$stage_chunk_mode" \
                "${json_flags[@]}" \
                "${extra_flags[@]}"; then
                if [[ "$require_live_web" == "true" ]] && response_indicates_web_unavailable "$output_file"; then
                  if (( attempt < attempts )); then
                    echo "[$stage] live web unavailable signal detected, retrying attempt $((attempt + 1))/${attempts}"
                    attempt=$((attempt + 1))
                    sleep 2
                    continue
                  fi
                  return 30
                fi
                return 0
              fi

              if (( attempt >= attempts )); then
                return 1
              fi

              echo "[$stage] execution failed, retrying attempt $((attempt + 1))/${attempts}"
              attempt=$((attempt + 1))
              sleep 2
            done

            return 1
          }

          validate_json() {
            local file="$1"
            python - "$file" <<'PY'
          import json, sys, re
          raw = open(sys.argv[1], "r", encoding="utf-8").read().strip()
          m = re.search(r'\{.*\}', raw, re.S)
          candidate = m.group(0) if m else raw
          json.loads(candidate)
          print(candidate)
          PY
          }

          validate_stage_contract() {
            local stage="$1"
            local file="$2"
            python - "$stage" "$file" <<'PY'
          import json, sys

          stage, path = sys.argv[1:3]
          data = json.load(open(path, "r", encoding="utf-8"))
          if not isinstance(data, dict):
              raise SystemExit(f"{stage} output must be a JSON object")

          if stage == "router":
              required = ["schema_version", "intent_type", "task_type", "confidence", "requires_local_execution", "reason"]
              missing = [k for k in required if k not in data]
              if missing:
                  raise SystemExit(f"router missing keys: {', '.join(missing)}")
              allowed = {"question", "job", "research", "needs_clarification"}
              if str(data.get("intent_type") or "") not in allowed:
                  raise SystemExit("router.intent_type invalid")

          elif stage == "planner":
              required = ["schema_version", "intent_type", "task_type", "confidence", "requires_local_execution", "parameters", "missing_fields", "success_condition"]
              missing = [k for k in required if k not in data]
              if missing:
                  raise SystemExit(f"planner missing keys: {', '.join(missing)}")
              allowed = {"job", "needs_clarification"}
              if str(data.get("intent_type") or "") not in allowed:
                  raise SystemExit("planner.intent_type invalid")
              if not isinstance(data.get("parameters"), dict):
                  raise SystemExit("planner.parameters must be object")
              if not isinstance(data.get("missing_fields"), list):
                  raise SystemExit("planner.missing_fields must be array")
              if str(data.get("intent_type")) == "needs_clarification" and not str(data.get("question") or "").strip():
                  raise SystemExit("planner.question required when intent_type=needs_clarification")

          print(json.dumps(data, ensure_ascii=False))
          PY
          }

          response_indicates_web_unavailable() {
            local file="$1"
            python - "$file" <<'PY'
          import re, sys
          from pathlib import Path
          text = Path(sys.argv[1]).read_text(encoding="utf-8", errors="ignore").lower()
          patterns = [
              r"don.?t have live web access",
              r"do not have live web access",
              r"don.?t have live weather access",
              r"do not have live weather access",
              r"i don.?t have .* live .* access right now",
              r"live web search .* unavailable",
              r"web search was required .* unavailable",
              r"cannot browse the web",
              r"unable to access live web",
              r"live_web_unavailable",
          ]
          hit = any(re.search(p, text) for p in patterns)
          raise SystemExit(0 if hit else 1)
          PY
          }

          question_requires_live_web() {
            local question_file="$1"
            python - "$question_file" <<'PY'
          import re, sys
          from pathlib import Path
          text = Path(sys.argv[1]).read_text(encoding="utf-8", errors="ignore").lower()
          dynamic_markers = [
              "weather", "forecast", "temperature", "today", "current", "now", "latest", "recently released", "price", "news", "score", "schedule", "traffic"
          ]
          has_dynamic = any(m in text for m in dynamic_markers)
          print("true" if has_dynamic else "false")
          PY
          }

          is_system_test_prompt() {
            local question_file="$1"
            python - "$question_file" <<'PY'
          import re
          import sys
          from pathlib import Path
          text = Path(sys.argv[1]).read_text(encoding="utf-8", errors="ignore").strip()
          lowered = text.lower()
          patterns = [
              r"\breply\s+with\s+exactly\b",
              r"\brespond\s+with\s+exactly\b",
              r"\breturn\s+exactly\b",
              r"\boutput\s+exactly\b",
              r"\bexactly:\s*\S+",
          ]
          hit = any(re.search(p, lowered) for p in patterns)
          print("true" if hit else "false")
          PY
          }

          apply_router_system_test_override() {
            local router_json="$1"
            python - "$router_json" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          data = json.loads(path.read_text(encoding="utf-8"))
          data["intent_type"] = "question"
          data["task_type"] = "system_command"
          data["requires_local_execution"] = False
          try:
              conf = float(data.get("confidence", 0))
              data["confidence"] = max(conf, 0.85)
          except Exception:
              data["confidence"] = 0.85
          reason = str(data.get("reason") or "").strip()
          suffix = "Deterministic system-test override applied for exact-reply probe."
          data["reason"] = f"{reason} {suffix}".strip() if reason else suffix
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
          }

          extract_exact_reply_target() {
            local question_file="$1"
            python - "$question_file" <<'PY'
          import re
          import sys
          from pathlib import Path

          text = Path(sys.argv[1]).read_text(encoding="utf-8", errors="ignore").strip()
          target = ""
          patterns = [
              r"(?is)\b(?:reply|respond|return|output)\s+with\s+exactly\s*:?\s*(.+)$",
              r"(?is)\bexactly\s*:?\s*(.+)$",
          ]
          for pattern in patterns:
              m = re.search(pattern, text)
              if m:
                  target = m.group(1).strip()
                  break

          if not target:
              lines = [line.strip() for line in text.splitlines() if line.strip()]
              if lines:
                  target = lines[-1]

          target = target.strip().strip("`")
          if len(target) >= 2 and target[0] == target[-1] and target[0] in "\"'":
              target = target[1:-1].strip()

          print(target)
          PY
          }

          parse_context_value() {
            local context_file="$1"
            local key="$2"
            python - "$context_file" "$key" <<'PY'
          import json
          import sys
          from pathlib import Path
          path = Path(sys.argv[1])
          key = sys.argv[2]
          if not path.exists():
              print("")
              raise SystemExit(0)
          try:
              payload = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              print("")
              raise SystemExit(0)
          value = payload.get(key)
          if value is None:
              print("")
          elif isinstance(value, (dict, list)):
              print(json.dumps(value, ensure_ascii=False))
          else:
              print(str(value))
          PY
          }

          parse_context_chunking() {
            local context_file="$1"
            python - "$context_file" <<'PY'
          import json
          import sys
          from pathlib import Path
          path = Path(sys.argv[1])
          if not path.exists():
              print("1|none")
              raise SystemExit(0)
          try:
              payload = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              print("1|none")
              raise SystemExit(0)
          chunking = payload.get("chunking")
          if not isinstance(chunking, dict):
              transport = payload.get("transport")
              if isinstance(transport, dict):
                  chunking = transport.get("chunking")
          if not isinstance(chunking, dict):
              print("1|none")
              raise SystemExit(0)

          enabled = bool(chunking.get("enabled"))
          try:
              chunk_count = int(chunking.get("chunk_count") or 1)
          except Exception:
              chunk_count = 1
          chunk_count = max(1, min(chunk_count, 5))
          if not enabled:
              chunk_count = 1

          mode = str(chunking.get("mode") or "").strip().lower()
          allowed = {"none", "map_reduce", "finalize_on_last_chunk", "legacy"}
          if mode not in allowed:
              mode = "finalize_on_last_chunk" if chunk_count > 1 else "none"
          if chunk_count <= 1:
              mode = "none"
          print(f"{chunk_count}|{mode}")
          PY
          }

          find_memory_reuse_candidate() {
            local question_file="$1"
            local current_job_id="$2"
            local out_file="$3"
            python tools/find_memory_reuse_candidate.py \
              --question-file "$question_file" \
              --current-job-id "$current_job_id" \
              --min-score "$MEMORY_MIN_SCORE" \
              --min-similarity "$MEMORY_MIN_SIMILARITY" \
              --required-confidence "$MEMORY_REQUIRED_CONFIDENCE" \
              --out-file "$out_file"
          }

          apply_promotion_policy() {
            local eval_file="$1"
            python tools/apply_promotion_policy.py \
              --eval-file "$eval_file" \
              --min-score "$MEMORY_PROMOTION_MIN_SCORE" \
              --required-confidence "$MEMORY_REQUIRED_CONFIDENCE"
          }

          build_memory_reuse_context() {
            local candidate_file="$1"
            local memory_file="$2"
            python - "$candidate_file" "$memory_file" <<'PY'
          import json, sys
          from pathlib import Path
          candidate_path = Path(sys.argv[1])
          memory_path = Path(sys.argv[2])

          try:
              payload = json.loads(candidate_path.read_text(encoding="utf-8")) if candidate_path.exists() else {}
          except Exception:
              payload = {}

          if not isinstance(payload, dict):
              payload = {}

          response = str(payload.get("response_content") or "").strip()
          if not response:
              memory_path.write_text("", encoding="utf-8")
              raise SystemExit(0)

          parts = ["Reusable context from a prior high-quality similar answer:"]
          question = str(payload.get("source_question_preview") or "").strip()
          if question:
              parts.append(f"- Prior question: {question}")
          parts.append(f"- Prior answer: {response}")
          score = payload.get("score")
          similarity = payload.get("similarity")
          confidence = payload.get("confidence_band")
          if score is not None or similarity is not None or confidence:
              parts.append(f"- Match metrics: score={score}, similarity={similarity}, confidence={confidence}")

          memory_path.write_text("\n".join(parts).strip() + "\n", encoding="utf-8")
          PY
          }

          render_request_payload() {
            local user_file="$1"
            local memory_file="$2"
            local out_file="$3"
            python - "$user_file" "$memory_file" "$out_file" <<'PY'
          from pathlib import Path
          import sys
          user_file, memory_file, out_file = sys.argv[1:4]
          user_text = Path(user_file).read_text(encoding="utf-8").strip()
          memory = ""
          if Path(memory_file).exists():
              memory = Path(memory_file).read_text(encoding="utf-8").strip()
          parts = []
          if memory:
              parts.append("Relevant memory:")
              parts.append(memory)
          parts.append("Current request:")
          parts.append(user_text)
          Path(out_file).write_text("\n\n".join(parts).strip() + "\n", encoding="utf-8")
          PY
          }

          build_final_phraser_input() {
            local execution_json="$1"
            local out_file="$2"
            python - "$execution_json" "$out_file" <<'PY'
          from pathlib import Path
          import json, sys
          src, out = sys.argv[1:3]
          data = json.loads(Path(src).read_text(encoding="utf-8"))
          text = "Execution result:\n" + json.dumps(data, indent=2, ensure_ascii=False)
          Path(out).write_text(text + "\n", encoding="utf-8")
          PY
          }

          execute_local_task() {
            local planner_json="$1"
            local out_json="$2"
            python - "$planner_json" "$out_json" <<'PY'
          import json
          import hashlib
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          planner_path = Path(sys.argv[1])
          out_path = Path(sys.argv[2])

          def now_iso() -> str:
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          try:
              plan = json.loads(planner_path.read_text(encoding="utf-8"))
          except Exception as exc:
              payload = {
                  "execution_status": "failed",
                  "task_type": None,
                  "verified": False,
                  "details": {
                      "code": "PLANNER_JSON_INVALID",
                      "message": f"Planner JSON invalid: {exc}",
                  },
                  "executed_at": now_iso(),
              }
              out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
              raise SystemExit(0)

          task_type = str(plan.get("task_type") or "").strip()
          params = plan.get("parameters") if isinstance(plan.get("parameters"), dict) else {}
          success_condition = str(plan.get("success_condition") or "")

          try:
              from app.task_registry import get_task, validate_required_fields  # type: ignore
          except Exception:
              required_map = {
                  "scheduled_weather_report": ("frequency", "time", "location"),
                  "reminder": ("time", "message"),
                  "file_write": ("path", "content"),
              }

              def get_task(task: str):
                  req = required_map.get(task)
                  if req is None:
                      return None
                  return {"task_type": task, "required_fields": req, "executor_name": task}

              def validate_required_fields(task: str, parameters: dict):
                  req = required_map.get(task)
                  if req is None:
                      return ["task_type"]
                  missing = []
                  for f in req:
                      v = parameters.get(f)
                      if v is None or v == "":
                          missing.append(f)
                  return missing

          base = {
              "task_type": task_type or None,
              "verified": False,
              "executed_at": now_iso(),
          }

          if not task_type:
              payload = {
                  **base,
                  "execution_status": "failed",
                  "details": {
                      "code": "MISSING_TASK_TYPE",
                      "message": "Planner output did not include task_type.",
                      "parameters": params,
                  },
              }
              out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
              raise SystemExit(0)

          if task_type.startswith("system_"):
              payload = {
                  **base,
                  "execution_status": "success",
                  "verified": True,
                  "details": {
                      "executor": "system_noop",
                      "message": "System meta task requires no external execution.",
                      "task_type": task_type,
                      "response_text": str(params.get("response_text") or params.get("message") or ""),
                      "success_condition": success_condition,
                  },
              }
              out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
              raise SystemExit(0)

          task_def = get_task(task_type)
          if task_def is None:
              payload = {
                  **base,
                  "execution_status": "failed",
                  "details": {
                      "code": "UNSUPPORTED_TASK_TYPE",
                      "message": f"Unsupported task_type: {task_type}",
                      "parameters": params,
                  },
              }
              out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
              raise SystemExit(0)

          missing = validate_required_fields(task_type, params)
          if missing:
              payload = {
                  **base,
                  "execution_status": "needs_clarification",
                  "details": {
                      "code": "MISSING_REQUIRED_FIELDS",
                      "message": "Task parameters are missing required fields.",
                      "missing_fields": missing,
                      "parameters": params,
                  },
              }
              out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
              raise SystemExit(0)

          cwd = Path.cwd().resolve()

          if task_type == "file_write":
              raw_path = str(params.get("path") or "").strip()
              content = str(params.get("content") or "")
              target = Path(raw_path)
              if not target.is_absolute():
                  target = (cwd / target).resolve()
              else:
                  target = target.resolve()

              try:
                  target.relative_to(cwd)
              except Exception:
                  payload = {
                      **base,
                      "execution_status": "failed",
                      "details": {
                          "code": "PATH_OUTSIDE_WORKSPACE",
                          "message": "file_write path must stay inside repository workspace.",
                          "path": str(target),
                      },
                  }
                  out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
                  raise SystemExit(0)

              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content, encoding="utf-8")
              digest = hashlib.sha256(content.encode("utf-8")).hexdigest()

              payload = {
                  **base,
                  "execution_status": "success",
                  "verified": True,
                  "details": {
                      "executor": getattr(task_def, "executor_name", None) or task_def.get("executor_name"),
                      "path": str(target),
                      "bytes_written": len(content.encode("utf-8")),
                      "sha256": digest,
                      "success_condition": success_condition,
                  },
              }
              out_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
              raise SystemExit(0)

